<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>WinOFlex | 404</title>
	<link rel="icon" href="logo.jpg" type="image/jpeg" />
	<script src="https://cdn.tailwindcss.com"></script>
	<style>
		:root {
			--glow: rgba(79, 209, 255, 0.55);
			--panel: rgba(8, 18, 32, 0.72);
			--border: rgba(79, 209, 255, 0.22);
		}

		body {
			background: radial-gradient(circle at 20% 20%, rgba(79, 209, 255, 0.12), transparent 32%),
				radial-gradient(circle at 80% 0%, rgba(56, 189, 248, 0.12), transparent 30%),
				radial-gradient(circle at 70% 75%, rgba(14, 165, 233, 0.14), transparent 38%),
				linear-gradient(145deg, #030712, #020617 40%, #0b1222 100%);
			min-height: 100vh;
			color: #e2e8f0;
			font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
			overflow: hidden;
		}

		.grid-overlay {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			pointer-events: none;
			background-image:
				linear-gradient(to right, rgba(226, 232, 240, 0.04) 1px, transparent 1px),
				linear-gradient(to bottom, rgba(226, 232, 240, 0.04) 1px, transparent 1px);
			background-size: 90px 90px;
			opacity: 0.45;
			mask-image: radial-gradient(circle at 50% 50%, black 20%, transparent 70%);
		}

		.scanline {
			position: fixed;
			top: -100%;
			left: 0;
			width: 100%;
			height: 120%;
			background: linear-gradient(180deg, transparent 0%, rgba(79, 209, 255, 0.04) 50%, transparent 100%);
			animation: scan 5.5s linear infinite;
			pointer-events: none;
		}

		@keyframes scan {
			0% { transform: translateY(-40%); }
			100% { transform: translateY(40%); }
		}

		@keyframes float {
			0%, 100% { transform: translateY(0); }
			50% { transform: translateY(-10px); }
		}

		.glow-orb {
			position: absolute;
			width: 140px;
			height: 140px;
			border-radius: 9999px;
			background: radial-gradient(circle, rgba(79, 209, 255, 0.24), transparent 65%);
			filter: blur(22px);
			animation: float 7s ease-in-out infinite;
		}

		.glow-orb:nth-child(2) {
			width: 180px;
			height: 180px;
			animation-duration: 9s;
			animation-delay: -1s;
		}

		.glow-orb:nth-child(3) {
			width: 120px;
			height: 120px;
			animation-duration: 6.5s;
			animation-delay: -2.3s;
		}

		.panel {
			background: var(--panel);
			border: 1px solid var(--border);
			box-shadow: 0 25px 55px rgba(4, 10, 28, 0.45);
			backdrop-filter: blur(12px);
		}

		.pill {
			display: inline-flex;
			align-items: center;
			gap: 0.5rem;
			padding: 0.5rem 0.9rem;
			border-radius: 9999px;
			border: 1px solid rgba(79, 209, 255, 0.3);
			background: rgba(79, 209, 255, 0.12);
			font-size: 0.85rem;
			color: #e0f2fe;
		}

		.cta-primary {
			transition: transform 320ms cubic-bezier(0.22, 1, 0.36, 1), box-shadow 320ms ease, background-color 220ms ease;
		}

		.cta-primary:hover {
			transform: translateY(-4px);
			box-shadow: 0 20px 40px rgba(79, 209, 255, 0.22);
			background: rgba(34, 211, 238, 0.22);
		}

		.cta-secondary {
			transition: transform 280ms cubic-bezier(0.22, 1, 0.36, 1), box-shadow 280ms ease, border-color 220ms ease;
		}

		.cta-secondary:hover {
			transform: translateY(-3px);
			box-shadow: 0 16px 32px rgba(148, 163, 184, 0.18);
			border-color: rgba(148, 163, 184, 0.5);
		}

		@media (max-width: 640px) {
			body { overflow: auto; }
			.grid-overlay { background-size: 70px 70px; }
		}

		@media (prefers-reduced-motion: reduce) {
			.scanline, .glow-orb { animation: none !important; }
		}
	</style>
</head>
<body class="relative">
	<div class="grid-overlay" aria-hidden="true"></div>
	<div class="scanline" aria-hidden="true"></div>
	<div class="pointer-events-none" aria-hidden="true">
		<div class="glow-orb" style="top: 10%; left: 12%;"></div>
		<div class="glow-orb" style="top: 70%; left: 78%;"></div>
		<div class="glow-orb" style="top: 55%; left: 24%;"></div>
	</div>

	<main class="max-w-5xl mx-auto px-6 py-16 sm:py-24">
		<header class="flex items-center justify-between mb-10">
			<div class="flex items-center gap-3">
				<img src="logo.jpg" alt="WinOFlex logo" class="h-11 w-11 rounded-2xl border border-cyan-400/40 bg-slate-900/60 object-cover shadow-[0_0_25px_rgba(79,209,255,0.35)]" />
				<div>
					<p class="text-xs tracking-[0.3em] text-cyan-200/80 uppercase">WinOFlex</p>
					<p class="text-slate-400 text-sm">Signal Lost</p>
				</div>
			</div>
			<a href="index.html" class="pill">Return Home</a>
		</header>

		<section class="panel rounded-3xl p-8 sm:p-12 relative overflow-hidden">
			<div class="absolute inset-0 opacity-60" aria-hidden="true">
				<svg class="w-full h-full" viewBox="0 0 400 400" fill="none">
					<g stroke="rgba(79, 209, 255, 0.24)" stroke-width="0.6">
						<circle cx="200" cy="200" r="70" />
						<circle cx="200" cy="200" r="120" />
						<circle cx="200" cy="200" r="170" />
						<circle cx="200" cy="200" r="220" />
					</g>
				</svg>
			</div>

			<div class="relative space-y-6">
				<p class="text-sm uppercase tracking-[0.36em] text-cyan-200/70">404 • Not Found</p>
				<h1 class="font-semibold text-4xl sm:text-5xl text-cyan-100 leading-tight">Route disrupted. The page drifted off the WinOFlex grid.</h1>
				<p class="text-lg text-slate-300 max-w-2xl">We could not locate that endpoint. Recalibrate back to home, or ping me if you need a new path.</p>

				<div class="flex flex-wrap gap-3 pt-2">
					<span class="pill">Animated Grid</span>
					<span class="pill">Signal Beacon</span>
					<span class="pill">Glowing Orbits</span>
				</div>

				<div class="flex flex-col sm:flex-row gap-4 pt-4">
					<a href="index.html" class="cta-primary inline-flex items-center justify-center rounded-full bg-cyan-400/30 border border-cyan-400/80 px-6 py-3 text-base font-semibold text-cyan-50">
						Return Home
					</a>
					<a href="mailto:joshuasamuelafs@outlook.com" class="cta-secondary inline-flex items-center justify-center rounded-full bg-slate-900/60 border border-slate-400/30 px-6 py-3 text-base font-semibold text-slate-200">
						Report Issue
					</a>
				</div>
			</div>
		</section>
	</main>
</body>
</html>
